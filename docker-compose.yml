services:
  db:
    image: postgres:15
    container_name: budgetly-db
    environment:
      POSTGRES_DB: budgetly
      POSTGRES_USER: budgetly_user
      POSTGRES_PASSWORD: budgetly_password
    ports:
      - "5433:5432"
    volumes:
      - budgetly_data:/var/lib/postgresql/data

volumes:
  budgetly_data: