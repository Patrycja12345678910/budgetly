spring.application.name=budgetly

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/budgetly}
spring.datasource.username=${DB_USER:budgetly_user}
spring.datasource.password=${DB_PASSWORD:budgetly_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.thymeleaf.cache=false

server.port=${PORT:8080}