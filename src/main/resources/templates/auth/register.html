<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Rejestracja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-body">
          <h2 class="text-center mb-4">Rejestracja</h2>

          <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="mb-3">
              <label class="form-label">Login</label>
              <input class="form-control" type="text" th:field="*{username}">
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" th:field="*{email}">
            </div>

            <div class="mb-3">
              <label class="form-label">Hasło</label>
              <input class="form-control" type="password" th:field="*{password}">
            </div>

            <button class="btn btn-success w-100" type="submit">Zarejestruj</button>
          </form>

          <hr>

          <div class="text-center">
            <a href="/login">Masz już konto? Zaloguj się</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
