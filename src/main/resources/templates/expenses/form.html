<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wydatek</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-body">

                    <h2 class="mb-4">Wydatek</h2>

                    <form th:action="@{/expenses}" th:object="${expense}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Nazwa wydatku</label>
                            <input class="form-control" type="text" th:field="*{title}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Kwota</label>
                            <input class="form-control" type="number" step="0.01" th:field="*{amountOriginal}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Waluta</label>
                            <select class="form-select" th:field="*{currency}">
                                <option value="PLN">PLN</option>
                                <option value="EUR">EUR</option>
                                <option value="USD">USD</option>
                                <option value="GBP">GBP</option>
                                <option value="CHF">CHF</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Data</label>
                            <input class="form-control" type="date" th:field="*{expenseDate}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Kategoria</label>
                            <select class="form-select" th:field="*{category}">
                                <option th:each="category : ${categories}"
                                        th:value="${category.id}"
                                        th:text="${category.name}">
                                </option>
                            </select>
                        </div>

                        <button class="btn btn-success" type="submit">Zapisz</button>
                        <a href="/expenses" class="btn btn-secondary">Anuluj</a>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
