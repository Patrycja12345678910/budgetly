<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Wydatki</title>
</head>
<body>

<h1>Wydatki</h1>

<a href="/expenses/new">Dodaj wydatek</a>
<br><br>

<form method="get" action="/expenses">
  <label>Filtruj po miesiącu:</label>
  <input type="month" name="month" th:value="${selectedMonth}">
  <button type="submit">Filtruj</button>
  <a href="/expenses">Wyczyść</a>
</form>

<br>

<h2>Podsumowanie</h2>

<p>Suma wydatków: <span th:text="${totalPln}"></span> PLN</p>
<p>Liczba wydatków: <span th:text="${#lists.size(expenses)}"></span></p>

<p>
  Największy wydatek:
  <span th:if="${maxExpense != null}"
        th:text="${maxExpense.title + ' - ' + maxExpense.amountPln + ' PLN'}">
    </span>
  <span th:if="${maxExpense == null}">brak</span>
</p>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Nazwa</th>
    <th>Kwota</th>
    <th>Waluta</th>
    <th>Kurs</th>
    <th>Kwota PLN</th>
    <th>Data</th>
    <th>Kategoria</th>
  </tr>

  <tr th:each="expense : ${expenses}">
    <td th:text="${expense.id}"></td>
    <td th:text="${expense.title}"></td>
    <td th:text="${expense.amountOriginal}"></td>
    <td th:text="${expense.currency}"></td>
    <td th:text="${expense.exchangeRate}"></td>
    <td th:text="${expense.amountPln}"></td>
    <td th:text="${expense.expenseDate}"></td>
    <td th:text="${expense.category != null ? expense.category.name : '-'}"></td>
  </tr>
</table>

<br>

<a href="/">Strona główna</a>

</body>
</html>
