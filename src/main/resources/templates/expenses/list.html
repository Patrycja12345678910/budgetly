<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Wydatki</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Budgetly</a>
    <a class="btn btn-outline-light btn-sm" href="/categories">Kategorie</a>
  </div>
</nav>

<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Wydatki</h1>
    <a href="/expenses/new" class="btn btn-primary">Dodaj wydatek</a>
  </div>

  <form method="get" action="/expenses" class="card card-body mb-4">
    <div class="row align-items-end">
      <div class="col-md-4">
        <label class="form-label">Filtruj po miesiącu</label>
        <input class="form-control" type="month" name="month" th:value="${selectedMonth}">
      </div>
      <div class="col-md-4">
        <button class="btn btn-success" type="submit">Filtruj</button>
        <a href="/expenses" class="btn btn-secondary">Wyczyść</a>
      </div>
    </div>
  </form>

  <div class="row mb-4">
    <div class="col-md-4">
      <div class="card text-bg-primary">
        <div class="card-body">
          <h5 class="card-title">Suma wydatków</h5>
          <p class="card-text fs-4">
            <span th:text="${totalPln}"></span> PLN
          </p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-success">
        <div class="card-body">
          <h5 class="card-title">Liczba wydatków</h5>
          <p class="card-text fs-4" th:text="${#lists.size(expenses)}"></p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-warning">
        <div class="card-body">
          <h5 class="card-title">Największy wydatek</h5>
          <p class="card-text"
             th:if="${maxExpense != null}"
             th:text="${maxExpense.title + ' - ' + maxExpense.amountPln + ' PLN'}"></p>
          <p class="card-text" th:if="${maxExpense == null}">brak</p>
        </div>
      </div>
    </div>
  </div>

  <table class="table table-striped table-bordered">
    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Nazwa</th>
      <th>Kwota</th>
      <th>Waluta</th>
      <th>Kurs</th>
      <th>Kwota PLN</th>
      <th>Data</th>
      <th>Kategoria</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="expense : ${expenses}">
      <td th:text="${expense.id}"></td>
      <td th:text="${expense.title}"></td>
      <td th:text="${expense.amountOriginal}"></td>
      <td th:text="${expense.currency}"></td>
      <td th:text="${expense.exchangeRate}"></td>
      <td th:text="${expense.amountPln}"></td>
      <td th:text="${expense.expenseDate}"></td>
      <td th:text="${expense.category != null ? expense.category.name : '-'}"></td>
    </tr>
    </tbody>
  </table>

  <a href="/" class="btn btn-secondary">Powrót</a>

</div>

</body>
</html>
