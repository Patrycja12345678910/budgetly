<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Wydatki</title>
</head>
<body>

<h1>Wydatki</h1>

<a href="/expenses/new">Dodaj wydatek</a>

<br><br>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Tytuł</th>
    <th>Kwota</th>
    <th>Waluta</th>
    <th>Kurs</th>
    <th>Kwota PLN</th>
    <th>Data</th>
    <th>Kategoria</th>
  </tr>

  <tr th:each="expense : ${expenses}">
    <td th:text="${expense.id}"></td>
    <td th:text="${expense.title}"></td>
    <td th:text="${expense.amountOriginal}"></td>
    <td th:text="${expense.currency}"></td>
    <td th:text="${expense.exchangeRate}"></td>
    <td th:text="${expense.amountPln}"></td>
    <td th:text="${expense.expenseDate}"></td>
    <td th:text="${expense.category != null ? expense.category.name : '-'}"></td>
  </tr>
</table>

<br>

<a href="/">Strona główna</a>

</body>
</html>
