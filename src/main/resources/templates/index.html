<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Budgetly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Budgetly</a>
        <div>
            <a class="btn btn-outline-light btn-sm me-2" href="/categories">Kategorie</a>
            <a class="btn btn-outline-light btn-sm" href="/expenses">Wydatki</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="p-5 bg-light rounded shadow-sm">
        <h1>Budgetly</h1>
        <p class="lead">System monitorowania wydatków z integracją kursów walut.</p>

        <a class="btn btn-primary me-2" href="/categories">Zarządzaj kategoriami</a>
        <a class="btn btn-success me-2" href="/expenses">Zarządzaj wydatkami</a>

        <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-danger" type="submit">Wyloguj</button>
        </form>
    </div>
</div>

</body>
</html>
